plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bitchatter.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.bitchatter.app'
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }

        release {
            minifyEnabled false
        }
    }
}
